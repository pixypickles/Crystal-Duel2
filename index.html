<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#020712">
  <title>Crystal Duel 2</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <header class="hud">
      <section class="hp-panel">
        <span>YOUR CRYSTAL</span>
        <div class="hp-track"><i id="playerHpBar"></i></div>
        <b id="playerHp">15</b>
      </section>
      <div class="logo">CRYSTAL DUEL 2</div>
      <section class="hp-panel enemy">
        <span>ENEMY CRYSTAL</span>
        <div class="hp-track"><i id="enemyHpBar"></i></div>
        <b id="enemyHp">15</b>
      </section>
    </header>

    <section id="stage">

    <div id="startScreen" class="start-screen">
      <div class="start-card">
        <h1>CRYSTAL DUEL 2</h1>
        <p>難易度を選択してください</p>

        <div class="difficulty-list">
          <button class="difficulty-button" data-difficulty="easy">
            <strong>EASY</strong>
            <span>初心者向け</span>
          </button>

          <button class="difficulty-button selected" data-difficulty="normal">
            <strong>NORMAL</strong>
            <span>標準</span>
          </button>

          <button class="difficulty-button" data-difficulty="hard">
            <strong>HARD</strong>
            <span>上級者向け</span>
          </button>
        </div>

        <button id="startButton" class="start-button">START</button>
      </div>
    </div>

      <canvas id="game"></canvas>

      <div id="result" class="result hidden">
        <h1 id="resultText"></h1>
        <button id="restart">RESTART</button>
      </div>

      <div class="move-controls" aria-label="移動">
        <button id="upBtn" class="game-button move">▲</button>
        <button id="downBtn" class="game-button move">▼</button>
      </div>

      <div class="action-controls" aria-label="攻撃とガード">
        <button class="game-button shot shot-up" data-shot="-1">↗</button>
        <button class="game-button guard" id="guardBtn">GUARD</button>
        <button class="game-button shot shot-straight" data-shot="0">→</button>
        <button class="game-button shot shot-down" data-shot="1">↘</button>
      </div>

      <div class="status-row">
        <span id="difficultyLabel">NORMAL</span>
        <span>SHOT <b id="shotCount">0</b>/4</span>
        <span id="chargeText">長押しでチャージ</span>
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
